name: Reproduce CloudBuild

on:
  pull_request:
    branches: [ master ]

jobs:
  cloudbuild-repro:
    runs-on: ubuntu-latest  # 7 GB RAM — same ballpark as N1_HIGHCPU_8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Show runner resources
        run: |
          echo "=== CPUs ==="
          nproc
          cat /proc/cpuinfo | grep "model name" | head -1

          echo "=== Memory ==="
          free -h
          cat /proc/meminfo | grep -E "MemTotal|MemAvailable|SwapTotal"

          echo "=== cgroups memory limit (if any) ==="
          cat /sys/fs/cgroup/memory.max 2>/dev/null || \
          cat /sys/fs/cgroup/memory/memory.limit_in_bytes 2>/dev/null || \
          echo "no cgroup limit"

          echo "=== Go sees ==="
          go env GOMAXPROCS 2>/dev/null || true
          nproc  # what Go runtime.NumCPU() will return

      - name: Simulate Cloud Build (no memory guard, high parallelism)
        env:
          GOMAXPROCS: 8   # simulate N1_HIGHCPU_8 core count
          # no GOMEMLIMIT — matches Cloud Build
        run: |
          GOARCH=amd64 go build ./... &
          GOARCH=arm64 go build ./... &
          GOARCH=arm   GOARM=7 go build ./... &
          wait

  oom-repro:
    name: Reproduce OOM
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build multiarch inside memory/CPU-capped container (expect OOM)
        run: |
          docker run --rm \
            --name oom-test \
            --cpus=4 \
            --memory=7g --memory-swap=7g \
            -v ${{ github.workspace }}:/app -w /app \
            -e GOMAXPROCS=4 \
            golang:1.26-bookworm \
            bash -c '
              GOARCH=amd64              go build ./... &
              GOARCH=arm64              go build ./... &
              GOARCH=arm   GOARM=7      go build ./... &
              wait
            '

      - name: Check OOMKilled flag
        if: always()
        run: |
          STATUS=$(docker inspect oom-test --format '{{.State.OOMKilled}}' 2>/dev/null || echo "container already removed")
          echo "OOMKilled: $STATUS"

      - name: Build multiarch with fix (GOFLAGS=-p=2)
        run: |
          docker run --rm \
            --cpus=8 \
            --memory=7g --memory-swap=7g \
            -v ${{ github.workspace }}:/app -w /app \
            -e GOFLAGS=-p=2 \
            golang:1.26-bookworm \
            bash -c '
              GOARCH=amd64              go build ./... &
              GOARCH=arm64              go build ./... &
              GOARCH=arm   GOARM=7      go build ./... &
              wait
            '
